<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggiungi Candidato | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <!-- SIDEBAR (loaded dynamically from sidebar.html) -->
    <aside id="sidebar"></aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center space-x-4">
                <button data-toggle="sidebar" class="lg:hidden p-2 rounded-md hover:bg-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <a href="./dashboard.html" class="ie-back-button text-sm font-medium text-gray-600 hover:text-gray-900 flex items-center space-x-1" data-back-button="true">
                    <span aria-hidden="true">←</span>
                    <span>Indietro</span>
                </a>
                <h1 class="text-2xl font-bold serif text-[#1b4332]">Add New Candidate</h1>
            </div>
            
            <div class="flex items-center space-x-6">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-semibold text-gray-800">Matteo Di Noia</p>
                    <p class="text-[10px] uppercase tracking-tighter text-[#c5a059] font-bold">Admin</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-[#c5a059] overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Matteo+Di+Noia&background=1b4332&color=fff" alt="User">
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-8 space-y-8 max-w-[1000px] mx-auto w-full">

            <div class="mb-6">
                <h2 class="text-3xl font-bold serif text-[#1b4332]">Candidate Profile</h2>
                <p class="text-gray-500 text-sm italic">Compila i campi sottostanti per inserire un nuovo talento nel database.</p>
            </div>

            <div id="candidateActions" class="flex items-center justify-end gap-2 mb-4"></div>

            <div class="flex justify-center mb-4">
                <div class="candidate-photo-wrapper w-[140px] h-[140px] rounded-full overflow-hidden border border-gray-200 shadow-sm flex items-center justify-center bg-gray-100">
                    <img
                        id="candidatePhotoPreview"
                        src="https://ui-avatars.com/api/?name=Candidato&background=1b4332&color=fff"
                        alt="Candidate photo"
                        class="w-full h-full object-cover"
                    >
                </div>
            </div>

            <form id="candidateForm" class="space-y-8">
                
                <!-- Section: Personal Information -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Personal Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="form-label">First Name</label>
                            <input type="text" name="first_name" placeholder="Es. Alessandro" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Last Name</label>
                            <input type="text" name="last_name" placeholder="Es. Rossi" class="form-input">
                        </div>
                        <div class="md:col-span-2">
                            <label class="form-label">Address</label>
                            <input type="text" name="address" placeholder="Es. Via Montenapoleone 1, Milano" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Section: Professional Information -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Professional Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="form-label">Position</label>
                            <input type="text" name="position" placeholder="Es. Sommelier Senior" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Client Name</label>
                            <input type="text" name="client_name" placeholder="Es. Grand Hotel Milano" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Status</label>
                            <select name="status" class="form-input appearance-none">
                                <option value="new">New</option>
                                <option value="interview">Interview</option>
                                <option value="hired">Hired</option>
                                <option value="rejected">Rejected</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Source</label>
                            <select name="source" class="form-input appearance-none">
                                <option value="linkedin">LinkedIn</option>
                                <option value="email">Email</option>
                                <option value="facebook">Facebook</option>
                                <option value="website">Website</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Section: Documents -->
                <div id="candidateDocumentsSection" class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Documents</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="form-label">Upload CV (PDF)</label>
                            <div class="candidate-file-block" data-file-type="cv">
                                <div class="file-state text-xs text-gray-500"></div>
                                <div class="file-actions mt-2 flex flex-wrap gap-2"></div>
                                <input type="file" name="cv_file" accept=".pdf" class="hidden">
                            </div>
                        </div>
                        <div>
                            <label class="form-label">Upload Photo</label>
                            <div class="candidate-file-block" data-file-type="photo">
                                <div class="file-state text-xs text-gray-500"></div>
                                <div class="file-actions mt-2 flex flex-wrap gap-2"></div>
                                <input type="file" name="foto_file" accept="image/*" class="hidden">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: Notes -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Additional Notes</h3>
                    <div>
                        <label class="form-label">Notes</label>
                        <textarea name="notes" rows="4" placeholder="Inserisci eventuali note aggiuntive sul candidato..." class="form-input resize-none"></textarea>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex items-center justify-end space-x-4 pt-4 pb-12">
                    <button type="button" data-edit-cancel class="px-8 py-3 rounded-xl border border-gray-200 text-gray-500 font-semibold text-sm hover:bg-gray-50 transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-10 py-3 rounded-xl bg-[#1b4332] text-white font-semibold text-sm shadow-xl hover:bg-[#1b4332]/90 transition-all transform hover:-translate-y-1">
                        Save Candidate
                    </button>
                </div>

            </form>

        </div>
    </main>

    <!-- Supabase (auth + data) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
