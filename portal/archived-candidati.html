<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidati archiviati | Italian Experience Recruitment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <aside id="sidebar"></aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center space-x-4">
                <button data-toggle="sidebar" class="lg:hidden p-2 rounded-md hover:bg-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="text-2xl font-bold serif text-[#1b4332]">Candidati archiviati</h1>
            </div>
            <div class="flex items-center space-x-6">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-semibold text-gray-800">Matteo Di Noia</p>
                    <p class="text-[10px] uppercase tracking-tighter text-[#c5a059] font-bold">Admin</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-[#c5a059] overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Matteo+Di+Noia&background=1b4332&color=fff" alt="User">
                </div>
            </div>
        </header>

        <div class="p-8 space-y-8 max-w-[1600px] mx-auto w-full">

            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-3xl font-bold serif text-[#1b4332]">Candidati archiviati</h2>
                    <p class="text-gray-500 text-sm italic">Candidati archiviati. Solo visualizzazione ed eliminazione definitiva.</p>
                </div>
                <a href="candidati.html" class="inline-flex items-center space-x-2 px-6 py-3 rounded-lg border border-gray-200 text-gray-700 font-semibold text-sm hover:bg-gray-50 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    <span>Torna a Candidati</span>
                </a>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50/80 text-gray-500 text-[10px] uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-5 font-bold">Name</th>
                                <th class="px-6 py-5 font-bold">Position</th>
                                <th class="px-6 py-5 font-bold">Status</th>
                                <th class="px-6 py-5 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm" data-ie-archived-candidati-body>
                        </tbody>
                    </table>
                </div>
                <div class="p-6 bg-white/50 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-gray-100" data-ie-archived-candidati-pagination>
                    <p class="text-xs text-gray-500 font-medium" data-ie-archived-candidati-pagination-summary>Mostrando 0 di 0 risultati</p>
                    <div class="flex items-center space-x-2">
                        <button type="button" data-ie-archived-candidati-pagination-prev class="p-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <span class="text-xs font-bold text-gray-700 px-3 uppercase tracking-tighter" data-ie-archived-candidati-pagination-pages>Pagina 1 di 1</span>
                        <button type="button" data-ie-archived-candidati-pagination-next class="p-2 rounded-lg bg-[#1b4332] text-white hover:bg-[#1b4332]/90 transition shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
