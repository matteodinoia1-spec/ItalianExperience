<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset password | Italian Experience</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Playfair Display for headers, Montserrat for body -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/ui.css">
    <style>
        :root {
            --primary-green: #1b4332;
            --gold-accent: #c5a059;
            --cream-bg: #fdfcf8;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: url('https://images.unsplash.com/photo-1516483638261-f4dbaf036963?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--primary-green);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Mobile: compact layout and viewport-fit card */
        @media (max-width: 767px) {
            body {
                background-attachment: scroll;
                min-height: 100vh;
                min-height: 100dvh;
                align-items: flex-start;
                justify-content: flex-start;
                padding: max(0.5rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right)) max(0.5rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
            }
            .login-card {
                max-height: calc(100dvh - 1rem);
                max-height: calc(100vh - 1rem);
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                margin: 0;
                border-radius: 1rem;
            }
            .login-card .login-left {
                min-height: 140px;
                padding: 1rem 1.25rem;
            }
            .login-card .login-left h2 {
                font-size: 1.35rem;
                margin-bottom: 0.5rem;
            }
            .login-card .login-left p.text-lg {
                font-size: 0.875rem;
                line-height: 1.4;
            }
            .login-card .login-right {
                padding: 1rem 1.25rem 1.5rem;
            }
            .login-card .login-right .login-header {
                margin-bottom: 1rem;
            }
            .login-card .login-right .login-header h1 {
                font-size: 1.5rem;
                margin-bottom: 0.25rem;
            }
            .login-card .login-right .login-header p {
                font-size: 0.75rem;
            }
            .login-card .login-form .input-field {
                padding: 0.625rem 0.75rem;
                font-size: 16px; /* evita zoom su iOS */
            }
            .login-card .login-form .btn-submit {
                padding: 0.75rem 1rem;
                font-size: 0.75rem;
                margin-top: 0.5rem;
            }
            .login-card .login-footer {
                margin-top: 1rem;
            }
            .login-card .login-footer .divider {
                margin-top: 1rem;
            }
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Main glass effect */
        .glass-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .bg-italian-overlay {
            background: linear-gradient(rgba(27, 67, 50, 0.6), rgba(27, 67, 50, 0.3)), 
                        url('https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .btn-gold {
            background-color: var(--gold-accent);
            transition: all 0.3s ease;
            color: white;
            border: 1px solid var(--gold-accent);
        }

        .btn-gold:hover {
            background-color: rgba(197, 160, 89, 0.1);
            color: var(--gold-accent);
            backdrop-filter: blur(5px);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(27, 67, 50, 0.2);
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid var(--gold-accent);
        }

        /* Loading animation */
        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen min-h-[100dvh] flex flex-col md:flex-row items-center justify-center p-4 pt-[max(1rem,env(safe-area-inset-top))] pr-[max(1rem,env(safe-area-inset-right))] pb-[max(1rem,env(safe-area-inset-bottom))] pl-[max(1rem,env(safe-area-inset-left))]">

    <!-- Wrapper for global glass effect (scrollable on mobile) -->
    <div class="login-card max-w-5xl w-full rounded-2xl overflow-hidden flex flex-col md:flex-row glass-container fade-in flex-shrink-0 md:my-0 my-2 sm:my-6">
        
        <!-- Left column: image + welcome -->
        <div class="login-left md:w-1/2 bg-italian-overlay p-8 md:p-12 text-white flex flex-col justify-between min-h-[220px] md:min-h-[600px]">
            <div class="backdrop-brightness-90 p-6 rounded-xl bg-white/5 backdrop-blur-sm border border-white/10">
                <h2 class="text-3xl lg:text-4xl font-bold italic mb-4 serif">Welcome</h2>
                <p class="text-lg font-light opacity-95 leading-relaxed">
                    Log in to continue your journey through Italy’s wonders, flavors, and art.
                </p>
            </div>
            <div class="mt-auto">
                <p class="text-sm tracking-widest uppercase border-t border-white/30 pt-4">Italian Experience</p>
            </div>
        </div>

        <!-- Right column: reset password form -->
        <div class="login-right md:w-1/2 p-8 lg:p-16 flex flex-col justify-center">
            <div class="login-header mb-10 text-center md:text-left">
                <h1 class="text-4xl font-bold mb-2 serif">Reset password</h1>
                <p class="text-gray-600 text-sm italic">Enter a new password for your account.</p>
            </div>

            <form id="resetForm" class="login-form space-y-4 md:space-y-6">
                <!-- New password -->
                <div class="relative">
                    <label for="newPassword" class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-1">New password</label>
                    <input type="password" id="newPassword" name="newPassword" required
                        class="w-full py-3 px-4 rounded-t-lg input-field text-gray-800 placeholder-gray-400"
                        placeholder="••••••••">
                </div>

                <!-- Confirm password -->
                <div class="relative">
                    <label for="confirmPassword" class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-1">Confirm password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                        class="w-full py-3 px-4 rounded-t-lg input-field text-gray-800 placeholder-gray-400"
                        placeholder="••••••••">
                </div>

                <!-- Submit button -->
                <button type="submit" id="submitBtn" class="ie-btn ie-btn-primary w-full mt-4">
                    Update password
                </button>
            </form>

            <!-- Inline message under button -->
            <div id="formMessage" class="mt-4 text-center text-sm hidden"></div>

            <!-- Form footer -->
            <div class="login-footer mt-12 text-center">
                <p class="text-gray-500 text-xs uppercase tracking-widest font-medium">
                    Back to <a href="index.html" class="text-[#c5a059] hover:underline">login</a>.
                </p>
                
                <div class="divider flex items-center justify-center space-x-4 mt-8 opacity-40">
                    <div class="h-px w-8 bg-gray-400"></div>
                    <span class="text-xs uppercase tracking-tighter">Explore Italy</span>
                    <div class="h-px w-8 bg-gray-400"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Messaggio Box (Custom) - come nel login -->
    <div id="messageBox" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-white/90 backdrop-blur-md border border-white/40 px-6 py-4 rounded-xl shadow-2xl hidden flex items-center space-x-3">
        <div id="messageIcon" class="p-2 bg-green-100/50 rounded-full text-green-700">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <p id="messageText" class="text-sm font-semibold text-gray-800"></p>
    </div>

    <!-- Config: must be loaded before Supabase client boot -->
    <script src="../assets/js/config.js"></script>
    <!-- Supabase JS v2 (publishable key only) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="core/supabase-client.js"></script>
    <script src="core/data/candidates.js"></script>
    <script src="core/data/clients.js"></script>
    <script src="core/data/job-offers.js"></script>
    <script src="core/data/applications.js"></script>
    <script src="core/supabase.js"></script>
    <script src="core/auth.js"></script>
    <script>
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            const msgText = document.getElementById('messageText');
            const icon = document.getElementById('messageIcon');
            msgText.innerText = text;
            if (type === 'error') {
                icon.className = 'p-2 bg-red-100/50 rounded-full text-red-700';
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
            } else {
                icon.className = 'p-2 bg-green-100/50 rounded-full text-green-700';
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>';
            }
            box.classList.remove('hidden');
            setTimeout(function() { box.classList.add('hidden'); }, 4000);
        }

        function setFormDisabled(disabled) {
            var form = document.getElementById('resetForm');
            var btn = document.getElementById('submitBtn');
            var inputs = form.querySelectorAll('input');
            form.disabled = disabled;
            btn.disabled = disabled;
            inputs.forEach(function(inp) { inp.disabled = disabled; });
        }

        function hasRecoveryInUrl() {
            var hash = window.location.hash || '';
            var search = window.location.search || '';
            return hash.indexOf('type=recovery') !== -1 || search.indexOf('type=recovery') !== -1;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            var formMessage = document.getElementById('formMessage');

            if (!hasRecoveryInUrl()) {
                formMessage.textContent = 'Invalid access to this page.';
                formMessage.className = 'mt-4 text-center text-sm text-red-600';
                formMessage.classList.remove('hidden');
                setFormDisabled(true);
                return;
            }

            if (!window.IESupabase) {
                formMessage.textContent = 'Loading error. Please try again later.';
                formMessage.className = 'mt-4 text-center text-sm text-red-600';
                formMessage.classList.remove('hidden');
                setFormDisabled(true);
                return;
            }

            setTimeout(async function() {
                var result = await window.IESupabase.getSession();
                if (!result.data || !result.data.session) {
                    formMessage.textContent = 'Invalid or expired link.';
                    formMessage.className = 'mt-4 text-center text-sm text-red-600';
                    formMessage.classList.remove('hidden');
                    setFormDisabled(true);
                    return;
                }
                formMessage.classList.add('hidden');
            }, 300);
        });

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var newPassword = document.getElementById('newPassword').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var formMessage = document.getElementById('formMessage');
            var submitBtn = document.getElementById('submitBtn');

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showMessage('Password must be at least 8 characters.', 'error');
                return;
            }

            if (!window.IESupabase || !window.IESupabase.supabase) {
                showMessage('Internal error. Please try again later.', 'error');
                return;
            }

            submitBtn.disabled = true;
            showMessage('Updating...', 'success');

            var result = await window.IESupabase.supabase.auth.updateUser({ password: newPassword });

            if (result.error) {
                submitBtn.disabled = false;
                showMessage(result.error.message || 'Error updating password.', 'error');
                return;
            }

            await window.IESupabase.supabase.auth.signOut();
            showMessage('Password updated successfully. Redirecting to login...', 'success');
            setTimeout(function() {
                if (window.IESupabase && typeof window.IESupabase.redirectToLogin === 'function') {
                    window.IESupabase.redirectToLogin();
                } else {
                    window.location.href = 'index.html';
                }
            }, 2000);
        });
    </script>
</body>
</html>
