<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggiungi Cliente | Italian Experience Recruitment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <aside id="sidebar"></aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center space-x-4">
                <button data-toggle="sidebar" class="lg:hidden p-2 rounded-md hover:bg-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <a href="./dashboard.html" class="ie-back-button text-sm font-medium text-gray-600 hover:text-gray-900 flex items-center space-x-1" data-back-button="true">
                    <span aria-hidden="true">←</span>
                    <span>Indietro</span>
                </a>
                <h1 class="text-2xl font-bold serif text-[#1b4332]">Aggiungi Cliente</h1>
            </div>
            <div class="flex items-center space-x-6">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-semibold text-gray-800">—</p>
                    <p class="text-[10px] uppercase tracking-tighter text-[#c5a059] font-bold">—</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-[#c5a059] overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=User&background=1b4332&color=fff" alt="User">
                </div>
            </div>
        </header>

        <div class="p-8 space-y-8 max-w-[1000px] mx-auto w-full">
            <div class="mb-6">
                <h2 class="text-3xl font-bold serif text-[#1b4332]">Dati Cliente</h2>
                <p class="text-gray-500 text-sm italic">Inserisci i dati dell'azienda o del partner.</p>
            </div>

            <div id="clientActions" class="flex items-center justify-end gap-2 mb-4"></div>

            <form id="clientForm" class="space-y-8">
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Informazioni</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="form-label">Nome / Ragione sociale *</label>
                            <input type="text" name="name" required placeholder="Es. Grand Hotel Milano" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Città</label>
                            <input type="text" name="city" placeholder="Es. Milano" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Stato / Regione</label>
                            <input type="text" name="state" placeholder="Es. Lombardia" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Nazione</label>
                            <input type="text" name="country" placeholder="Es. Italia" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Email</label>
                            <input type="email" name="email" placeholder="contatti@azienda.it" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Telefono</label>
                            <input type="text" name="phone" placeholder="+39 02 1234567" class="form-input">
                        </div>
                        <div class="md:col-span-2">
                            <label class="form-label">Note</label>
                            <textarea name="notes" rows="3" placeholder="Note opzionali..." class="form-input resize-none"></textarea>
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-end space-x-4 pt-4 pb-12">
                    <button type="button" data-edit-cancel class="px-8 py-3 rounded-xl border border-gray-200 text-gray-500 font-semibold text-sm hover:bg-gray-50 transition-all">
                        Annulla
                    </button>
                    <button type="submit" class="px-10 py-3 rounded-xl bg-[#1b4332] text-white font-semibold text-sm shadow-xl hover:bg-[#1b4332]/90 transition-all transform hover:-translate-y-1">
                        Salva Cliente
                    </button>
                </div>
            </form>

            <div id="activity-container"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabase.js"></script>
    <script src="js/activity-section.js"></script>
    <script src="app.js"></script>
</body>
</html>
