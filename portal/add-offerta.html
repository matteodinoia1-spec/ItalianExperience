<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Offerta | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <!-- SIDEBAR (loaded dynamically from sidebar.html) -->
    <aside id="sidebar"></aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center space-x-4">
                <button data-toggle="sidebar" class="lg:hidden p-2 rounded-md hover:bg-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <div class="flex items-center gap-4">
                    <h1 class="text-2xl font-bold serif text-[#1b4332]">Create New Job Offer</h1>
                    <div id="jobOfferHeaderStatus"></div>
                </div>
            </div>
            
            <div class="flex items-center space-x-6">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-semibold text-gray-800">Matteo Di Noia</p>
                    <p class="text-[10px] uppercase tracking-tighter text-[#c5a059] font-bold">Admin</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-[#c5a059] overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Matteo+Di+Noia&background=1b4332&color=fff" alt="User">
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-8 space-y-8 max-w-[1000px] mx-auto w-full">
            
            <div class="mb-6 flex items-start justify-between gap-4">
                <div>
                    <h2 class="text-3xl font-bold serif text-[#1b4332]">Job Offer Details</h2>
                    <p class="text-gray-500 text-sm italic">Definisci i parametri per la nuova ricerca di personale.</p>
                </div>
                <div id="jobOfferActions" class="flex items-center space-x-3"></div>
            </div>

            <form id="jobOfferForm" class="space-y-8">
                
                <!-- Section: Job Information -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Job Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="form-label">Job Title</label>
                            <input type="text" name="title" placeholder="Es. Executive Chef" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Position</label>
                            <input type="text" name="position" placeholder="Es. Cucina / Management" class="form-input">
                        </div>
                        <div class="relative">
                            <label class="form-label">Client / Company Name</label>
                            <input type="text" id="clientInput" name="client_name" autocomplete="off" placeholder="Digita nome cliente" class="form-input" required>
                            <input type="hidden" id="clientIdHidden" name="client_id">
                            <div id="clientSuggestions" class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden z-20 hidden"></div>
                        </div>
                        <div>
                            <label class="form-label">Location</label>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" name="city" placeholder="Es. Venezia" class="form-input">
                                <input type="text" name="state" placeholder="Es. VE" class="form-input">
                            </div>
                        </div>
                        <div>
                            <label class="form-label">Contract Type</label>
                            <input type="text" name="contract_type" placeholder="Es. Full-time" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Open Positions</label>
                            <input type="number" name="positions" min="1" step="1" placeholder="Es. 1" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Salary</label>
                            <input type="text" name="salary" placeholder="Es. €45.000 - €55.000" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Deadline</label>
                            <input type="date" name="deadline" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Section: Details -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Details</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="form-label">Job Description</label>
                            <textarea name="description" rows="4" placeholder="Descrivi il ruolo e le responsabilità..." class="form-input resize-none"></textarea>
                        </div>
                        <div>
                            <label class="form-label">Requirements</label>
                            <textarea name="requirements" rows="4" placeholder="Competenze, certificazioni e anni di esperienza richiesti..." class="form-input resize-none"></textarea>
                        </div>
                        <div>
                            <label class="form-label">Notes</label>
                            <textarea name="notes" rows="3" placeholder="Note interne aggiuntive..." class="form-input resize-none"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Section: Status -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Status</h3>
                    <div class="max-w-md">
                        <label class="form-label">Current Status</label>
                        <select name="status" class="form-input appearance-none">
                            <option value="open">Open</option>
                            <option value="inprogress">In Progress</option>
                            <option value="closed">Closed</option>
                        </select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div id="form-action-buttons" class="flex items-center justify-end space-x-4 pt-4 pb-12">
                    <button type="button" class="px-8 py-3 rounded-xl border border-gray-200 text-gray-500 font-semibold text-sm hover:bg-gray-50 transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-10 py-3 rounded-xl bg-[#1b4332] text-white font-semibold text-sm shadow-xl hover:bg-[#1b4332]/90 transition-all transform hover:-translate-y-1">
                        Save Job Offer
                    </button>
                </div>

                <!-- Associated Candidates (view mode only) -->
                <div id="associated-candidates-container" class="mt-8"></div>

            </form>

        </div>
    </main>

    <!-- Supabase (auth + data) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
