<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Offerta | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary-green: #1b4332;
            --gold-accent: #c5a059;
            --cream-bg: #fdfcf8;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream-bg);
            color: var(--primary-green);
            overflow-x: hidden;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-green);
            transition: all 0.3s ease;
        }

        .nav-link {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--gold-accent);
            color: var(--gold-accent);
        }

        /* Glass Styling */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        /* Form Styling */
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(27, 67, 50, 0.1);
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .form-input:focus {
            border-color: var(--gold-accent);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
        }

        .form-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6b7280;
            margin-bottom: 0.5rem;
            padding-left: 0.25rem;
        }

        .section-title {
            position: relative;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(27, 67, 50, 0.05);
        }

        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 50;
                height: 100vh;
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar h-screen flex flex-col text-white fixed lg:static left-0 top-0 shadow-2xl">
        <div class="p-8">
            <div class="flex items-center space-x-3 mb-10">
                <div class="w-10 h-10 bg-[#c5a059] rounded-full flex items-center justify-center text-white font-bold text-xl serif italic">
                    IE
                </div>
                <div>
                    <h2 class="text-lg font-bold serif leading-tight">Italian</h2>
                    <p class="text-[10px] uppercase tracking-widest opacity-60">Experience Portal</p>
                </div>
            </div>

            <nav class="space-y-2">
                <a href="dashboard.html" class="nav-link flex items-center space-x-4 py-3 px-4 rounded-r-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    <span class="text-sm font-medium">Dashboard</span>
                </a>
                <a href="candidati.html" class="nav-link flex items-center space-x-4 py-3 px-4 rounded-r-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span class="text-sm font-medium">Candidati</span>
                </a>
                <a href="offerte.html" class="nav-link active flex items-center space-x-4 py-3 px-4 rounded-r-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <span class="text-sm font-medium">Offerte di Lavoro</span>
                </a>
                <!-- Associations page removed -->
            </nav>
        </div>

        <div class="mt-auto p-8 border-t border-white/10">
            <a href="#" class="nav-link flex items-center space-x-4 py-3 px-4 rounded-r-lg mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="text-sm font-medium">Impostazioni</span>
            </a>
            <a href="login.html" class="flex items-center space-x-4 py-3 px-4 text-red-400 hover:text-red-300 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="text-sm font-medium">Logout</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center space-x-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-md hover:bg-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="text-2xl font-bold serif text-[#1b4332]">Create New Job Offer</h1>
            </div>
            
            <div class="flex items-center space-x-6">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-semibold text-gray-800">Matteo Di Noia</p>
                    <p class="text-[10px] uppercase tracking-tighter text-[#c5a059] font-bold">Admin</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-[#c5a059] overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Matteo+Di+Noia&background=1b4332&color=fff" alt="User">
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-8 space-y-8 max-w-[1000px] mx-auto w-full">
            
            <div class="mb-6">
                <h2 class="text-3xl font-bold serif text-[#1b4332]">Job Offer Details</h2>
                <p class="text-gray-500 text-sm italic">Definisci i parametri per la nuova ricerca di personale.</p>
            </div>

            <form id="jobOfferForm" class="space-y-8">
                
                <!-- Section: Job Information -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Job Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="form-label">Job Title</label>
                            <input type="text" placeholder="Es. Executive Chef" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Position</label>
                            <input type="text" placeholder="Es. Cucina / Management" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Client / Company Name</label>
                            <input type="text" placeholder="Es. Hotel Cipriani" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Location</label>
                            <input type="text" placeholder="Es. Venezia, IT" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Section: Details -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Details</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="form-label">Job Description</label>
                            <textarea rows="4" placeholder="Descrivi il ruolo e le responsabilità..." class="form-input resize-none"></textarea>
                        </div>
                        <div>
                            <label class="form-label">Requirements</label>
                            <textarea rows="4" placeholder="Competenze, certificazioni e anni di esperienza richiesti..." class="form-input resize-none"></textarea>
                        </div>
                        <div>
                            <label class="form-label">Notes</label>
                            <textarea rows="3" placeholder="Note interne aggiuntive..." class="form-input resize-none"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Section: Status -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Status</h3>
                    <div class="max-w-md">
                        <label class="form-label">Current Status</label>
                        <select class="form-input appearance-none">
                            <option value="open">Open</option>
                            <option value="inprogress">In Progress</option>
                            <option value="closed">Closed</option>
                        </select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex items-center justify-end space-x-4 pt-4 pb-12">
                    <button type="button" class="px-8 py-3 rounded-xl border border-gray-200 text-gray-500 font-semibold text-sm hover:bg-gray-50 transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-10 py-3 rounded-xl bg-[#1b4332] text-white font-semibold text-sm shadow-xl hover:bg-[#1b4332]/90 transition-all transform hover:-translate-y-1">
                        Save Job Offer
                    </button>
                </div>

            </form>

        </div>
    </main>

    <script>
        // Toggle Sidebar on Mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // Form Submission Placeholder
        document.getElementById('jobOfferForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Implementazione futura del salvataggio
            alert('Offerta di lavoro creata con successo (simulazione)');
        });

        // Chiusura sidebar cliccando fuori (su mobile)
        window.onclick = function(event) {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 1024 && event.target.closest('main') && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
