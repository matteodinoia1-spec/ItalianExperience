<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application | Italian Experience Recruitment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/ui.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <div class="portal-shell">
        <div id="sidebar"></div>

        <main class="portal-main flex-1 flex flex-col min-w-0">
        <div id="portal-header"></div>

        <div class="portal-toolbar sticky-toolbar">
            <div class="page-container toolbar-inner">
                <div class="toolbar-left">
                    <div class="portal-toolbar__left">
                        <div class="portal-toolbar__filters"></div>
                    </div>
                </div>
                <div class="portal-toolbar__center"></div>
                <div class="toolbar-right">
                    <div class="portal-toolbar__right">
                        <div class="portal-toolbar__actions"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="page-container">
        <div class="portal-content p-8 space-y-8" id="applicationDetailRoot">

            <!-- Header -->
            <section class="ie-card glass-card p-6 rounded-3xl" data-application-header>
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-1">Application</p>
                        <h1 class="serif text-2xl font-bold text-[#1b4332]" data-app-candidate>—</h1>
                        <p class="text-sm text-gray-600" data-app-offer>—</p>
                        <p class="text-xs text-gray-500" data-app-client>—</p>
                    </div>
                    <div class="flex flex-col items-start md:items-end gap-2">
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Status</label>
                        <select
                            data-app-status-select
                            class="form-input text-sm w-40"
                        >
                            <option value="applied">Applied</option>
                            <option value="screening">Screening</option>
                            <option value="interview">Interview</option>
                            <option value="offer">Offer</option>
                            <option value="hired">Hired</option>
                            <option value="rejected">Rejected</option>
                            <option value="withdrawn">Withdrawn</option>
                            <option value="not_selected">Not selected</option>
                        </select>
                        <p class="text-xs text-red-600 hidden" data-app-status-error></p>
                    </div>
                </div>
            </section>

            <!-- Pipeline dashboard -->
            <section class="ie-card glass-card p-4 rounded-3xl">
                <p class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">
                    Pipeline
                </p>
                <div class="flex flex-wrap gap-2 text-xs" data-app-pipeline>
                    <span data-stage="applied" class="inline-flex items-center px-3 py-1 rounded-full border border-gray-200 text-gray-600">Applied</span>
                    <span data-stage="screening" class="inline-flex items-center px-3 py-1 rounded-full border border-gray-200 text-gray-600">Screening</span>
                    <span data-stage="interview" class="inline-flex items-center px-3 py-1 rounded-full border border-gray-200 text-gray-600">Interview</span>
                    <span data-stage="offer" class="inline-flex items-center px-3 py-1 rounded-full border border-gray-200 text-gray-600">Offer</span>
                    <span data-stage="hired" class="inline-flex items-center px-3 py-1 rounded-full border border-gray-200 text-gray-600">Hired</span>
                </div>
            </section>

            <!-- Info cards -->
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="ie-card glass-card p-6 rounded-3xl" data-app-candidate-card>
                    <h3 class="serif text-lg font-bold text-[#1b4332] mb-2">Candidate</h3>
                    <p class="text-sm font-semibold text-gray-900" data-app-candidate-name>—</p>
                    <p class="text-xs text-gray-500 mb-2" data-app-candidate-position>—</p>
                    <a href="#" class="text-xs text-emerald-700 font-semibold hover:underline" data-app-candidate-link>View candidate</a>
                </div>
                <div class="ie-card glass-card p-6 rounded-3xl" data-app-offer-card>
                    <h3 class="serif text-lg font-bold text-[#1b4332] mb-2">Job offer</h3>
                    <p class="text-sm font-semibold text-gray-900" data-app-offer-title>—</p>
                    <p class="text-xs text-gray-500 mb-2" data-app-offer-position>—</p>
                    <a href="#" class="text-xs text-emerald-700 font-semibold hover:underline" data-app-offer-link>View job offer</a>
                </div>
                <div class="ie-card glass-card p-6 rounded-3xl" data-app-client-card>
                    <h3 class="serif text-lg font-bold text-[#1b4332] mb-2">Client</h3>
                    <p class="text-sm font-semibold text-gray-900" data-app-client-name>—</p>
                    <a href="#" class="text-xs text-emerald-700 font-semibold hover:underline" data-app-client-link>View client</a>
                </div>
            </section>

            <!-- Application data & notes -->
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="ie-card glass-card p-6 rounded-3xl space-y-2">
                    <h3 class="serif text-lg font-bold text-[#1b4332] mb-2">Application details</h3>
                    <p class="text-xs text-gray-500">
                        <span class="font-semibold">Created:</span>
                        <span data-app-created>—</span>
                    </p>
                    <p class="text-xs text-gray-500">
                        <span class="font-semibold">Last updated:</span>
                        <span data-app-updated>—</span>
                    </p>
                </div>
                <div class="ie-card glass-card p-6 rounded-3xl md:col-span-2">
                    <h3 class="serif text-lg font-bold text-[#1b4332] mb-2">Notes</h3>
                    <p class="text-sm text-gray-700 whitespace-pre-line" data-app-notes>—</p>
                </div>
            </section>

            <!-- Activity log -->
            <section class="ie-card glass-card p-6 rounded-3xl" id="applicationActivityLog">
                <h3 class="serif text-lg font-bold text-[#1b4332] mb-2">Activity</h3>
                <div id="applicationLogList" class="entity-activity__timeline mt-4 space-y-3"></div>
                <div id="applicationLogEmpty" class="entity-activity__empty mt-2 hidden">
                    No activity yet.
                </div>
            </section>

        </div>
        </div>
        </main>
    </div>

    <script>
      window.pageMeta = {
        title: "Application",
        subtitle: "Application details",
        breadcrumbs: [
          { label: "Dashboard", entity: "dashboard" },
          { label: "Applications", entity: "applications" },
          { label: "Application" }
        ]
      };
    </script>
    <script src="shared/header-loader.js"></script>
    <script src="core/debug.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="core/supabase.js"></script>
    <script src="queries/applications.queries.js"></script>
    <script src="core/auth.js"></script>
    <script src="core/router.js"></script>
    <script src="components/page-header.js"></script>
    <script src="core/entity-toolbar.js"></script>
    <script src="core/lists-runtime.js"></script>
    <script src="core/session/session.js"></script>
    <script src="core/ui/modals.js"></script>
    <script src="core/ui/previews.js"></script>
    <script src="core/app-shell.js"></script>
    <script src="features/applications/application-detail.js"></script>
</body>
</html>
