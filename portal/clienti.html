<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Clienti | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR (loaded dynamically from sidebar.html) -->
    <aside id="sidebar"></aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center space-x-4">
                <button data-toggle="sidebar" class="lg:hidden p-2 rounded-md hover:bg-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="text-2xl font-bold serif text-[#1b4332]">Clienti</h1>
            </div>
            
            <div class="flex items-center space-x-6">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-semibold text-gray-800">Matteo Di Noia</p>
                    <p class="text-[10px] uppercase tracking-tighter text-[#c5a059] font-bold">Admin</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-[#c5a059] overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Matteo+Di+Noia&background=1b4332&color=fff" alt="User">
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-8 space-y-8 max-w-[1600px] mx-auto w-full">
            
            <!-- Page Title & CTA -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-3xl font-bold serif text-[#1b4332]">Customers Management</h2>
                    <p class="text-gray-500 text-sm italic">Gestisci il network di aziende e partner dell'Experience Italiana.</p>
                </div>
                <button data-action="add-client" class="bg-[#c5a059] hover:bg-[#b08d4a] text-white px-6 py-3 rounded-lg font-semibold text-sm flex items-center space-x-2 shadow-lg transition-all transform hover:-translate-y-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                    <span>Add New Customer</span>
                </button>
            </div>

            <!-- Filters Section -->
            <div class="glass-card p-6 rounded-2xl">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Search -->
                    <div class="relative">
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-2 block">Cerca Azienda</label>
                        <input
                            type="text"
                            placeholder="Nome azienda..."
                            data-filter="client-name"
                            class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-100 rounded-lg text-sm focus:ring-1 focus:ring-[#c5a059] outline-none"
                        >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 bottom-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <!-- City Filter -->
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-2 block">Città</label>
                        <input
                            type="text"
                            placeholder="Es. Milano, Roma..."
                            data-filter="client-city"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-lg text-sm focus:ring-1 focus:ring-[#c5a059] outline-none"
                        >
                    </div>
                    <!-- State Filter -->
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-2 block">Stato / Regione</label>
                        <input
                            type="text"
                            placeholder="Es. Lombardia..."
                            data-filter="client-state"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-lg text-sm focus:ring-1 focus:ring-[#c5a059] outline-none"
                        >
                    </div>
                </div>
            </div>

            <!-- Customers Table Section -->
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50/80 text-gray-500 text-[10px] uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-5 font-bold">Nome</th>
                                <th class="px-6 py-5 font-bold">Città</th>
                                <th class="px-6 py-5 font-bold">Stato</th>
                                <th class="px-6 py-5 font-bold">Email</th>
                                <th class="px-6 py-5 font-bold">Telefono</th>
                                <th class="px-6 py-5 text-center font-bold">Azioni</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm" data-ie-clients-body>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="p-6 bg-white/50 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-gray-100" data-ie-pagination>
                    <p class="text-xs text-gray-500 font-medium" data-ie-pagination-summary>Mostrando 0 di 0 risultati</p>
                    <div class="flex items-center space-x-2">
                        <button
                            type="button"
                            data-ie-pagination-prev
                            class="p-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 transition disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                            </svg>
                        </button>
                        <span class="text-xs font-bold text-gray-700 px-3 uppercase tracking-tighter" data-ie-pagination-pages>Pagina 1 di 1</span>
                        <button
                            type="button"
                            data-ie-pagination-next
                            class="p-2 rounded-lg bg-[#1b4332] text-white hover:bg-[#1b4332]/90 transition shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Supabase (auth + data) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
