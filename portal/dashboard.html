<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/ui.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <div class="portal-shell">
        <!-- MAIN CONTENT -->
        <main class="portal-main portal-main--no-toolbar flex-1 flex flex-col min-w-0">
        <div id="portal-header"></div>

        <!-- Page Content -->
        <div class="page-container">
        <div class="portal-content p-8 space-y-8">

            <!-- Statistic Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass-card ie-card dashboard-metric clickable p-6 rounded-2xl" onclick="IERouter.navigateTo('candidates')" role="button" tabindex="0">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-green-50 rounded-xl text-[#1b4332]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                        </div>
                        <span class="dashboard-percentage text-xs font-bold" data-dashboard-percentage="totalCandidates">—</span>
                    </div>
                    <h3 class="ie-label-caps mb-1">Total candidates</h3>
                    <p class="text-3xl font-bold serif text-[#1b4332]" data-dashboard-value="totalCandidates" data-dashboard-loading><span class="dashboard-value">—</span></p>
                </div>

                <div class="glass-card ie-card dashboard-metric clickable p-6 rounded-2xl" onclick="IERouter.navigateTo('jobOffers')" role="button" tabindex="0">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-amber-50 rounded-xl text-[#c5a059]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <span class="dashboard-percentage text-xs font-bold" data-dashboard-percentage="activeJobOffers">—</span>
                    </div>
                    <h3 class="ie-label-caps mb-1">Active job offers</h3>
                    <p class="text-3xl font-bold serif text-[#1b4332]" data-dashboard-value="activeJobOffers" data-dashboard-loading><span class="dashboard-value">—</span></p>
                </div>

                <div class="glass-card ie-card dashboard-metric clickable p-6 rounded-2xl" onclick="IERouter.navigateTo('candidates', { status: 'new' })" role="button" tabindex="0">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-blue-50 rounded-xl text-blue-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                            </svg>
                        </div>
                        <span class="dashboard-percentage text-xs font-bold" data-dashboard-percentage="newCandidatesToday">—</span>
                    </div>
                    <h3 class="ie-label-caps mb-1">New candidates</h3>
                    <p class="text-3xl font-bold serif text-[#1b4332]" data-dashboard-value="newCandidatesToday" data-dashboard-loading><span class="dashboard-value">—</span></p>
                </div>

                <div class="glass-card ie-card dashboard-metric clickable p-6 rounded-2xl" onclick="IERouter.navigateTo('candidates', { status: 'hired' })" role="button" tabindex="0">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-purple-50 rounded-xl text-purple-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <span class="dashboard-percentage text-xs font-bold" data-dashboard-percentage="hiredThisMonth">—</span>
                    </div>
                    <h3 class="ie-label-caps mb-1">Hired</h3>
                    <p class="text-3xl font-bold serif text-[#1b4332]" data-dashboard-value="hiredThisMonth" data-dashboard-loading><span class="dashboard-value">—</span></p>
                </div>
            </div>

            <!-- Table and Distribution -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Recent Candidates Table -->
                <div class="lg:col-span-2 glass-card ie-card rounded-2xl overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white/50">
                        <h2 class="ie-section-title">Recent candidates</h2>
                        <button data-action="view-all-candidates" class="ie-btn ie-btn-primary">View all</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="ie-table w-full text-left">
                            <thead class="bg-gray-50/50">
                                <tr>
                                    <th class="ie-table-th">Name</th>
                                    <th class="ie-table-th">Desired role</th>
                                    <th class="ie-table-th">Date</th>
                                    <th class="ie-table-th">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100" data-dashboard="recentCandidates">
                                <tr data-dashboard-placeholder><td colspan="4" class="px-6 py-8 text-center text-gray-400">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Sources Distribution -->
                <div class="glass-card ie-card rounded-2xl p-6">
                    <h2 class="text-xl font-bold serif text-[#1b4332] mb-6">Candidates by source</h2>
                    
                    <div class="space-y-6" data-dashboard="candidatesBySource">
                        <div data-dashboard-placeholder class="text-gray-400 text-sm py-4">Loading...</div>
                    </div>

                    <div class="mt-8 p-4 bg-[#1b4332] rounded-xl text-white">
                        <p class="text-[10px] uppercase tracking-widest opacity-60 mb-1">Insights</p>
                        <p class="text-sm font-light">Data is updated in real time from the database.</p>
                    </div>
                </div>

            </div>

        </div>
        </div>
        </main>
    </div>

    <!-- Supabase (auth + data) -->
    <script src="shared/header-loader.js"></script>
    <script src="core/debug.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="core/supabase.js"></script>
    <script src="core/auth.js"></script>
    <script src="core/session-ready.js"></script>
    <script src="core/router.js"></script>
    <script src="runtime/router-runtime.js"></script>
    <script src="runtime/forms-runtime.js"></script>
    <script src="runtime/modals-runtime.js"></script>
    <script src="runtime/profile-runtime.js"></script>
    <script src="runtime/status-runtime.js"></script>
    <script src="runtime/associations-runtime.js"></script>
    <script src="runtime/candidate-profile-runtime.js"></script>
    <script src="runtime/candidate-runtime.js"></script>
    <script src="runtime/client-runtime.js"></script>
    <script src="runtime/job-offer-runtime.js"></script>
    <script src="runtime/header-runtime.js"></script>
    <script src="runtime/global-header-actions-runtime.js"></script>
    <script src="runtime/entity-actions-runtime.js"></script>
    <script src="runtime/page-bootstrap.js"></script>
    <script src="components/page-header.js"></script>
    <script src="core/entity-toolbar.js"></script>
    <script src="core/lists-runtime.js"></script>
    <script src="core/session/session.js"></script>
    <script src="core/ui/modals.js"></script>
    <script src="core/ui/previews.js"></script>
    <script src="core/app-shell.js"></script>
</body>
</html>
