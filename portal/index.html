<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login | Italian Experience</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Playfair Display for headers, Montserrat for body -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/ui.css">
    <style>
        :root {
            --primary-green: #1b4332;
            --gold-accent: #c5a059;
            --cream-bg: #fdfcf8;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: url('https://images.unsplash.com/photo-1516483638261-f4dbaf036963?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--primary-green);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Mobile: compact layout and viewport-fit card */
        @media (max-width: 767px) {
            body {
                background-attachment: scroll;
                min-height: 100vh;
                min-height: 100dvh;
                align-items: flex-start;
                justify-content: flex-start;
                padding: max(0.5rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right)) max(0.5rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
            }
            .login-card {
                max-height: calc(100dvh - 1rem);
                max-height: calc(100vh - 1rem);
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                margin: 0;
                border-radius: 1rem;
            }
            .login-card .login-left {
                min-height: 140px;
                padding: 1rem 1.25rem;
            }
            .login-card .login-left h2 {
                font-size: 1.35rem;
                margin-bottom: 0.5rem;
            }
            .login-card .login-left p.text-lg {
                font-size: 0.875rem;
                line-height: 1.4;
            }
            .login-card .login-right {
                padding: 1rem 1.25rem 1.5rem;
            }
            .login-card .login-right .login-header {
                margin-bottom: 1rem;
            }
            .login-card .login-right .login-header h1 {
                font-size: 1.5rem;
                margin-bottom: 0.25rem;
            }
            .login-card .login-right .login-header p {
                font-size: 0.75rem;
            }
            .login-card .login-form .input-field {
                padding: 0.625rem 0.75rem;
                font-size: 16px; /* evita zoom su iOS */
            }
            .login-card .login-form .btn-submit {
                padding: 0.75rem 1rem;
                font-size: 0.75rem;
                margin-top: 0.5rem;
            }
            .login-card .login-footer {
                margin-top: 1rem;
            }
            .login-card .login-footer .divider {
                margin-top: 1rem;
            }
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Effetto Glass Ice principale */
        .glass-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .bg-italian-overlay {
            background: linear-gradient(rgba(27, 67, 50, 0.6), rgba(27, 67, 50, 0.3)), 
                        url('https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .btn-gold {
            background-color: var(--gold-accent);
            transition: all 0.3s ease;
            color: white;
            border: 1px solid var(--gold-accent);
        }

        .btn-gold:hover {
            background-color: rgba(197, 160, 89, 0.1);
            color: var(--gold-accent);
            backdrop-filter: blur(5px);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(27, 67, 50, 0.2);
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid var(--gold-accent);
        }

        /* Loading animation */
        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen min-h-[100dvh] flex flex-col md:flex-row items-center justify-center p-4 pt-[max(1rem,env(safe-area-inset-top))] pr-[max(1rem,env(safe-area-inset-right))] pb-[max(1rem,env(safe-area-inset-bottom))] pl-[max(1rem,env(safe-area-inset-left))]">

    <!-- Wrapper for global glass effect (scrollable on mobile) -->
    <div class="login-card max-w-5xl w-full rounded-2xl overflow-hidden flex flex-col md:flex-row glass-container fade-in flex-shrink-0 md:my-0 my-2 sm:my-6">
        
        <!-- Left column: image + welcome -->
        <div class="login-left md:w-1/2 bg-italian-overlay p-8 md:p-12 text-white flex flex-col justify-between min-h-[220px] md:min-h-[600px]">
            <div class="backdrop-brightness-90 p-6 rounded-xl bg-white/5 backdrop-blur-sm border border-white/10">
                <h2 class="text-3xl lg:text-4xl font-bold italic mb-4 serif">Welcome</h2>
                <p class="text-lg font-light opacity-95 leading-relaxed">
                    Log in to continue your journey through Italy’s wonders, flavors, and art.
                </p>
            </div>
            <div class="mt-auto">
                <p class="text-sm tracking-widest uppercase border-t border-white/30 pt-4">Italian Experience</p>
            </div>
        </div>

        <!-- Right column: login form -->
        <div class="login-right md:w-1/2 p-8 lg:p-16 flex flex-col justify-center">
            <div class="login-header mb-10 text-center md:text-left">
                <h1 class="text-4xl font-bold mb-2 serif">Sign in</h1>
                <p class="text-gray-600 text-sm italic">Restricted area for community members.</p>
            </div>

            <form id="loginForm" class="login-form space-y-4 md:space-y-6">
                <!-- Email/Username -->
                <div class="relative">
                    <label for="email" class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-1">Email or username</label>
                    <input type="text" id="email" name="email" required
                        class="w-full py-3 px-4 rounded-t-lg input-field text-gray-800 placeholder-gray-400"
                        placeholder="example@experience.it">
                </div>

                <!-- Password -->
                <div class="relative">
                    <label for="password" class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-1">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full py-3 px-4 rounded-t-lg input-field text-gray-800 placeholder-gray-400"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword()" class="ie-btn ie-btn-secondary absolute right-4 bottom-3 !py-2 !px-2 min-w-0 text-gray-400 hover:text-gold-accent">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>

                <!-- Extra options -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" class="rounded border-gray-300 text-[#c5a059] focus:ring-[#c5a059] bg-white/50">
                        <span class="text-gray-600">Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="text-[#c5a059] hover:underline transition font-medium">Forgot password?</a>
                </div>

                <!-- Submit button -->
                <button type="submit" class="ie-btn ie-btn-primary w-full mt-4">
                    Sign in
                </button>
            </form>

            <!-- Form footer -->
            <div class="login-footer mt-12 text-center">
                <p class="text-gray-500 text-xs uppercase tracking-widest font-medium">
                    Access is by invitation only.
                </p>
                
                <div class="divider flex items-center justify-center space-x-4 mt-8 opacity-40">
                    <div class="h-px w-8 bg-gray-400"></div>
                    <span class="text-xs uppercase tracking-tighter">Explore Italy</span>
                    <div class="h-px w-8 bg-gray-400"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Messaggio Box (Custom) -->
    <div id="messageBox" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-white/90 backdrop-blur-md border border-white/40 px-6 py-4 rounded-xl shadow-2xl hidden flex items-center space-x-3">
        <div id="messageIcon" class="p-2 bg-green-100/50 rounded-full text-green-700">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <p id="messageText" class="text-sm font-semibold text-gray-800"></p>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />';
            } else {
                pwd.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                showMessage('Enter email and password.', 'error');
                return;
            }
            showMessage('Signing in...', 'success');
            if (!window.IESupabase) {
                console.error('[Login] IESupabase non è disponibile. Il client Supabase non è stato caricato.');
                showMessage('Internal error. Please try again later.', 'error');
                return;
            }

            if (typeof window.debugLog === "function") window.debugLog("[Login] Sign-in attempt");
            const { data, error } = await window.IESupabase.login(email, password);
            if (error) {
                console.error('[Login] Errore di autenticazione:', error);
                showMessage(error.message || 'Sign-in failed. Check email and password.', 'error');
                return;
            }

            if (!data || !data.user) {
                console.error('[Login] Risposta di login senza utente valido:', data);
                showMessage('Sign-in failed. Please try again.', 'error');
                return;
            }

            if (typeof window.debugLog === "function") window.debugLog("[Login] User authenticated");

            // Dopo il login, creiamo/aggiorniamo il profilo e poi
            // reindirizziamo SEMPRE alla dashboard (nessun fallback anonimo).
            try {
                await window.IESupabase.ensureProfile(data.user);
                if (typeof window.debugLog === "function") window.debugLog("[Login] Profile ensured");
            } catch (profileError) {
                console.error('[Login] Errore durante ensureProfile:', profileError);
            }

            showMessage('Welcome back! Redirecting...', 'success');
            window.IESupabase.redirectToDashboard();
        });

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            const msgText = document.getElementById('messageText');
            msgText.innerText = text;
            box.classList.remove('hidden');
            setTimeout(() => { box.classList.add('hidden'); }, 4000);
        }
    </script>
    <!-- Config: must be loaded before Supabase client boot -->
    <script src="../assets/js/config.js"></script>
    <!-- Supabase JS v2 (publishable key only) -->
    <script src="core/debug.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="core/supabase-client.js"></script>
    <script src="recruitment/core/data/candidates.js"></script>
    <script src="recruitment/core/data/clients.js"></script>
    <script src="recruitment/core/data/job-offers.js"></script>
    <script src="recruitment/core/data/applications.js"></script>
    <script src="core/supabase.js"></script>
    <script src="core/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.IESupabase) {

                const isRecovery =
                    window.location.hash.includes("type=recovery") ||
                    window.location.search.includes("type=recovery");

                if (!isRecovery) {
                    window.IESupabase.redirectToDashboardIfAuthenticated();
                }
            }
        });
    </script>
</body>
</html>
