<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job offers | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/ui.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <div class="portal-shell">
        <!-- SIDEBAR (loaded dynamically from sidebar.html) -->
        <div id="sidebar"></div>

        <!-- MAIN CONTENT -->
        <main class="portal-main flex-1 flex flex-col min-w-0">
        <div id="portal-header"></div>

        <div class="portal-toolbar sticky-toolbar">
            <div class="page-container toolbar-inner">
                <div class="toolbar-left">
                    <div class="portal-toolbar__left">
                        <div class="portal-toolbar__filters">
                        <div class="filter-bar">
                                <div class="filter-group relative">
                                    <label class="filter-label">Search title</label>
                                    <div class="relative">
                                        <input type="text" placeholder="e.g. Executive Chef..." data-filter="offer-title" class="filter-input w-full pl-10 pr-4">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 bottom-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                        </svg>
                                    </div>
                                </div>
                                <div class="filter-group">
                                    <label class="filter-label">Client / Company</label>
                                    <select data-filter="offer-client" class="filter-select w-full appearance-none cursor-pointer">
                                        <option value="">All clients</option>
                                    </select>
                                </div>
                                <div class="filter-group">
                                    <label class="filter-label">Offer status</label>
                                    <select data-filter="offer-status" class="filter-select w-full appearance-none cursor-pointer">
                                        <option value="">All statuses</option>
                                        <option value="active">Active (Open + In Progress)</option>
                                        <option value="open">Open</option>
                                        <option value="inprogress">In Progress</option>
                                        <option value="closed">Closed</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="portal-toolbar__center"></div>
                <div class="toolbar-right">
                    <div class="portal-toolbar__right">
                        <div class="portal-toolbar__actions">
                            <button data-action="add-job-offer" class="ie-btn ie-btn-primary">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                                </svg>
                                <span>Create Job Offer</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Page Content -->
        <div class="page-container">
        <div class="portal-content p-8 space-y-8">

            <!-- Client Filter Banner (from URL) -->
            <div class="mb-4 hidden" data-ie-client-filter-banner>
                <div class="flex items-center justify-between px-4 py-3 rounded-xl bg-emerald-50 border border-emerald-100 text-sm">
                    <p class="text-emerald-900">
                        Filtered by client:
                        <span class="font-semibold" data-ie-client-filter-name>—</span>
                    </p>
                    <button
                        type="button"
                        data-action="clear-client-filter"
                        class="ie-btn ie-btn-secondary"
                    >
                        Clear filter
                    </button>
                </div>
            </div>

            <!-- Job Offers Table Section -->
            <div class="glass-card ie-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="ie-table">
                        <thead class="bg-gray-50/80 text-gray-500 text-[10px] uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-5 font-bold">Job Title</th>
                                <th class="px-6 py-5 font-bold">Position</th>
                                <th class="px-6 py-5 font-bold">Client / Company</th>
                                <th class="px-6 py-5 font-bold">Location</th>
                                <th class="px-6 py-5 font-bold">Status</th>
                                <th class="px-6 py-5 font-bold">Candidates</th>
                                <th class="px-6 py-5 font-bold">Date Created</th>
                                <th class="px-6 py-5 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm" data-ie-joboffers-body>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="p-6 bg-white/50 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-gray-100" data-ie-pagination>
                    <p class="text-xs text-gray-500 font-medium" data-ie-pagination-summary>Showing 0 of 0 results</p>
                    <div class="flex items-center space-x-2">
                        <button type="button" data-ie-pagination-prev class="ie-btn ie-btn-secondary disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <span class="text-xs font-bold text-gray-700 px-3 uppercase tracking-titter" data-ie-pagination-pages>Page 1 of 1</span>
                        <button type="button" data-ie-pagination-next class="ie-btn ie-btn-primary disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>

        </div>
        </div>
        </main>
    </div>

    <!-- Supabase (auth + data) -->
    <script src="shared/header-loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="core/supabase.js"></script>
    <script src="core/auth.js"></script>
    <script src="core/router.js"></script>
    <script src="components/page-header.js"></script>
    <script src="core/entity-toolbar.js"></script>
    <script src="core/lists-runtime.js"></script>
    <script src="core/session/session.js"></script>
    <script src="core/ui/modals.js"></script>
    <script src="core/ui/previews.js"></script>
    <script src="core/app-shell.js"></script>
</body>
</html>
