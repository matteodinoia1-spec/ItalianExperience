<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>User profile | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/ui.css">
    <style>
        /* Profile-specific only; layout/form use style.css */
        .profile-avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .avatar-edit-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--ie-color-accent);
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .avatar-edit-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <div class="portal-shell">
        <!-- MAIN CONTENT -->
        <main class="portal-main portal-main--no-toolbar flex-1 flex flex-col min-w-0">
        <div id="portal-header"></div>

        <!-- Page Content -->
        <div class="page-container">
        <div class="portal-content p-8 space-y-8">

            <!-- Error message banner (hidden by default) -->
            <div class="profile-error-banner hidden ie-card glass-card p-4 rounded-2xl border border-red-100 bg-red-50/80">
                <p id="profileErrorMessage" class="text-sm text-red-700 font-medium"></p>
            </div>

            <!-- Profile Header Card -->
            <div class="ie-card glass-card p-8 rounded-3xl flex flex-col md:flex-row items-center gap-8">
                <div class="profile-avatar-container">
                    <img id="profilePreview" src="https://ui-avatars.com/api/?name=User&size=120&background=1b4332&color=fff" class="w-full h-full rounded-full border-4 border-[#c5a059] shadow-lg object-cover" alt="Avatar">
                    <label for="avatarUpload" class="ie-btn ie-btn-primary avatar-edit-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <input type="file" id="avatarUpload" class="hidden" accept="image/*">
                    </label>
                </div>
                <div class="text-center md:text-left">
                    <h2 id="profileTitle" class="text-3xl font-bold serif text-[#1b4332]">—</h2>
                    <p id="profileSubtitle" class="text-[#c5a059] font-semibold uppercase tracking-widest text-sm mb-2">—</p>
                    <p class="text-gray-500 text-sm italic max-w-md">Manage your personal information and your role in the portal.</p>
                </div>
            </div>

            <div class="page-form-actions flex items-center justify-end gap-2">
                <button
                    type="button"
                    id="profileEditButton"
                    class="ie-btn ie-btn-secondary"
                >
                    Edit
                </button>
                <button
                    type="button"
                    id="profileToolbarCancelBtn"
                    class="ie-btn ie-btn-secondary"
                >
                    Cancel
                </button>
                <button
                    type="submit"
                    form="profileForm"
                    id="profileToolbarSaveBtn"
                    class="ie-btn ie-btn-primary"
                >
                    Save changes
                </button>
            </div>

            <form id="profileForm" class="space-y-8">

                <!-- Section: Personal Information -->
                <div class="ie-card glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Personal information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="form-label" for="profileFirstName">First name</label>
                            <input id="profileFirstName" type="text" name="first_name" class="form-input" placeholder="First name">
                        </div>
                        <div>
                            <label class="form-label" for="profileLastName">Last name</label>
                            <input id="profileLastName" type="text" name="last_name" class="form-input" placeholder="Last name">
                        </div>
                        <div>
                            <label class="form-label" for="profileRole">Role</label>
                            <input id="profileRole" type="text" class="form-input bg-gray-50" readonly placeholder="—">
                        </div>
                        <div class="md:col-span-2">
                            <label class="form-label" for="profileEmail">Email</label>
                            <input id="profileEmail" type="email" class="form-input bg-gray-50" readonly placeholder="—">
                        </div>
                    </div>
                </div>
            </form>

            <!-- Section: Change Password -->
            <div class="ie-card glass-card p-8 rounded-3xl">
                <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Change password</h3>
                <form id="changePasswordForm" class="space-y-6 mt-6">
                    <div>
                        <label class="form-label" for="currentPassword">Current password</label>
                        <input type="password" id="currentPassword" name="currentPassword" class="input-field w-full py-3 px-4 rounded-xl" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <div>
                        <label class="form-label" for="newPassword">New password</label>
                        <input type="password" id="newPassword" name="newPassword" class="input-field w-full py-3 px-4 rounded-xl" placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <div>
                        <label class="form-label" for="confirmPassword">Confirm password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="input-field w-full py-3 px-4 rounded-xl" placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <div>
                        <button type="submit" id="changePasswordBtn" class="ie-btn ie-btn-primary">
                            Update password
                        </button>
                        <div id="changePasswordMessage" class="text-sm mt-2"></div>
                    </div>
                </form>
            </div>

        </div>
        </div>
        </main>
    </div>

    <!-- Success Toast -->
    <div id="successToast" class="fixed bottom-10 right-10 bg-white/90 backdrop-blur-md border border-green-100 p-4 rounded-2xl shadow-2xl hidden flex items-center space-x-4 z-50">
        <div class="p-2 bg-green-100 text-green-700 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <div>
            <p class="text-sm font-bold text-gray-800">Profile updated!</p>
            <p class="text-xs text-gray-500">Your changes have been saved successfully.</p>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="fixed bottom-10 right-10 bg-white/90 backdrop-blur-md border border-red-100 p-4 rounded-2xl shadow-2xl hidden flex items-center space-x-4 z-50">
        <div class="p-2 bg-red-100 text-red-700 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div>
            <p class="text-sm font-bold text-gray-800">Error</p>
            <p class="profile-error-text text-xs text-gray-600"></p>
        </div>
    </div>

    <!-- Supabase (auth + data) -->
    <script src="shared/header-loader.js"></script>
    <script src="core/debug.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="core/supabase-client.js"></script>
    <script src="core/data/candidates.js"></script>
    <script src="core/data/clients.js"></script>
    <script src="core/data/job-offers.js"></script>
    <script src="core/data/applications.js"></script>
    <script src="core/supabase.js"></script>
    <script src="core/auth.js"></script>
    <script src="core/session-ready.js"></script>
    <script src="core/router.js"></script>
    <script src="runtime/router-runtime.js"></script>
    <script src="runtime/forms-runtime.js"></script>
    <script src="runtime/modals-runtime.js"></script>
    <script src="runtime/profile-runtime.js"></script>
    <script src="runtime/status-runtime.js"></script>
    <script src="runtime/associations-runtime.js"></script>
    <script src="runtime/candidate-profile-runtime.js"></script>
    <script src="runtime/candidate-runtime.js"></script>
    <script src="runtime/client-runtime.js"></script>
    <script src="runtime/job-offer-runtime.js"></script>
    <script src="runtime/header-runtime.js"></script>
    <script src="runtime/global-header-actions-runtime.js"></script>
    <script src="runtime/entity-actions-runtime.js"></script>
    <script src="runtime/page-bootstrap.js"></script>
    <script src="components/page-header.js"></script>
    <script src="core/entity-toolbar.js"></script>
    <script src="core/lists-runtime.js"></script>
    <script src="core/session/session.js"></script>
    <script src="core/ui/modals.js"></script>
    <script src="core/ui/previews.js"></script>
    <script src="core/app-shell.js"></script>
    <script src="features/profile/profile.js"></script>
    <script>
        // Avatar preview (local only, no upload to backend)
        (function () {
            const avatarUpload = document.getElementById('avatarUpload');
            if (!avatarUpload) return;

            avatarUpload.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function (event) {
                    const preview = document.getElementById('profilePreview');
                    if (preview) preview.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        })();
    </script>
</body>
</html>
