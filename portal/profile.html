<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Utente | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Profile-specific only; layout/sidebar/form use style.css */
        .profile-avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .avatar-edit-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--ie-color-accent);
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .avatar-edit-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR (loaded dynamically from sidebar.html) -->
    <aside id="sidebar"></aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center space-x-4">
                <button data-toggle="sidebar" class="lg:hidden p-2 rounded-md hover:bg-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="text-2xl font-bold serif text-[#1b4332]">Profilo Utente</h1>
            </div>
            
            <div class="flex items-center space-x-6">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-semibold text-gray-800">—</p>
                    <p class="text-[10px] uppercase tracking-tighter text-[#c5a059] font-bold">—</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-[#c5a059] overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=User&background=1b4332&color=fff" alt="User">
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-8 space-y-8 max-w-[1000px] mx-auto w-full">
            
            <!-- Error message banner (hidden by default) -->
            <div class="profile-error-banner hidden glass-card p-4 rounded-2xl border border-red-100 bg-red-50/80">
                <p id="profileErrorMessage" class="text-sm text-red-700 font-medium"></p>
            </div>

            <!-- Profile Header Card -->
            <div class="glass-card p-8 rounded-3xl flex flex-col md:flex-row items-center gap-8">
                <div class="profile-avatar-container">
                    <img id="profilePreview" src="https://ui-avatars.com/api/?name=User&size=120&background=1b4332&color=fff" class="w-full h-full rounded-full border-4 border-[#c5a059] shadow-lg object-cover" alt="Avatar">
                    <label for="avatarUpload" class="avatar-edit-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <input type="file" id="avatarUpload" class="hidden" accept="image/*">
                    </label>
                </div>
                <div class="text-center md:text-left">
                    <h2 id="profileTitle" class="text-3xl font-bold serif text-[#1b4332]">—</h2>
                    <p id="profileSubtitle" class="text-[#c5a059] font-semibold uppercase tracking-widest text-sm mb-2">—</p>
                    <p class="text-gray-500 text-sm italic max-w-md">Gestisci le tue informazioni personali e il ruolo nel portale.</p>
                </div>
            </div>

            <form id="profileForm" class="space-y-8">
                
                <!-- Section: Personal Information -->
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Informazioni Personali</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="form-label" for="profileFirstName">Nome</label>
                            <input id="profileFirstName" type="text" name="first_name" class="form-input" placeholder="Nome">
                        </div>
                        <div>
                            <label class="form-label" for="profileLastName">Cognome</label>
                            <input id="profileLastName" type="text" name="last_name" class="form-input" placeholder="Cognome">
                        </div>
                        <div>
                            <label class="form-label" for="profileRole">Ruolo</label>
                            <input id="profileRole" type="text" class="form-input bg-gray-50" readonly placeholder="—">
                        </div>
                        <div class="md:col-span-2">
                            <label class="form-label" for="profileEmail">Email</label>
                            <input id="profileEmail" type="email" class="form-input bg-gray-50" readonly placeholder="—">
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex items-center justify-end space-x-4 pt-4 pb-12">
                    <button type="button" id="profileCancelBtn" class="px-8 py-3 rounded-xl border border-gray-200 text-gray-500 font-semibold text-sm hover:bg-gray-50 transition-all">
                        Annulla
                    </button>
                    <button type="submit" id="profileSubmitBtn" class="px-10 py-3 rounded-xl bg-[#1b4332] text-white font-semibold text-sm shadow-xl hover:bg-[#1b4332]/90 transition-all transform hover:-translate-y-1">
                        Salva Modifiche
                    </button>
                </div>

            </form>

        </div>
    </main>

    <!-- Success Toast -->
    <div id="successToast" class="fixed bottom-10 right-10 bg-white/90 backdrop-blur-md border border-green-100 p-4 rounded-2xl shadow-2xl hidden flex items-center space-x-4 z-50">
        <div class="p-2 bg-green-100 text-green-700 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <div>
            <p class="text-sm font-bold text-gray-800">Profilo aggiornato!</p>
            <p class="text-xs text-gray-500">Le modifiche sono state salvate correttamente.</p>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="fixed bottom-10 right-10 bg-white/90 backdrop-blur-md border border-red-100 p-4 rounded-2xl shadow-2xl hidden flex items-center space-x-4 z-50">
        <div class="p-2 bg-red-100 text-red-700 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div>
            <p class="text-sm font-bold text-gray-800">Errore</p>
            <p class="profile-error-text text-xs text-gray-600"></p>
        </div>
    </div>

    <!-- Supabase (auth + data) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        (async function () {
            try {
                if (window.__IE_AUTH_GUARD__ && typeof window.__IE_AUTH_GUARD__.then === "function") {
                    var allowed = await window.__IE_AUTH_GUARD__;
                    if (!allowed) return;
                } else if (window.IESupabase && typeof window.IESupabase.requireAuth === "function") {
                    var user = await window.IESupabase.requireAuth();
                    if (!user) return;
                }
            } catch (e) {
                return;
            }
        })();
    </script>
    <script src="profile/profile.js"></script>
    <script>
        // Avatar preview (local only, no upload to backend)
        (async function () {
            if (window.__IE_AUTH_GUARD__ && typeof window.__IE_AUTH_GUARD__.then === 'function') {
                try {
                    const authAllowed = await window.__IE_AUTH_GUARD__;
                    if (!authAllowed) return;
                } catch (error) {
                    return;
                }
            }

            const avatarUpload = document.getElementById('avatarUpload');
            if (!avatarUpload) return;

            avatarUpload.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function (event) {
                    const preview = document.getElementById('profilePreview');
                    if (preview) preview.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        })();
    </script>
</body>
</html>
