<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Clients | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/ui.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <div class="portal-shell">
        <!-- MAIN CONTENT -->
        <main class="portal-main portal-main--no-toolbar flex-1 flex flex-col min-w-0">
        <div id="portal-header"></div>

        <!-- Page Content -->
        <div class="page-container">
        <div class="portal-content p-8 space-y-8">
            <div class="page-layout-with-filters">
                <!-- Backdrop for mobile drawer (tap to close) -->
                <div class="page-filters-drawer-backdrop" data-close-filter-drawer aria-hidden="true"></div>
                <!-- Left: filter column (desktop/tablet sticky; mobile = drawer) -->
                <aside class="page-filters-column">
                    <div class="page-filters-column__mobile-header">
                        <span class="page-filters-column__mobile-title">Filters</span>
                        <button type="button" class="page-filters-drawer-close" data-close-filter-drawer aria-label="Close filters">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div class="filter-bar page-filters-column__bar">
                        <div class="filter-group relative">
                            <label class="filter-label">Search company</label>
                            <div class="relative">
                                <input
                                    type="text"
                                    placeholder="Company name..."
                                    data-filter="client-name"
                                    class="filter-input w-full pl-10 pr-4"
                                >
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 bottom-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </div>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">City</label>
                            <input
                                type="text"
                                placeholder="e.g. Milan, Rome..."
                                data-filter="client-city"
                                class="filter-input w-full"
                            >
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">State / Region</label>
                            <input
                                type="text"
                                placeholder="e.g. Lombardy..."
                                data-filter="client-state"
                                class="filter-input w-full"
                            >
                        </div>
                    </div>
                </aside>
                <!-- Right: main content -->
                <div class="page-main-column">
                    <!-- Mobile-only: trigger to open filter drawer -->
                    <div class="page-filters-trigger-wrap">
                        <button type="button" class="page-filters-trigger" data-toggle-filter-drawer aria-label="Open filters">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                            </svg>
                            <span>Filters</span>
                        </button>
                    </div>
            <!-- Clients Bulk Toolbar (appears when rows are selected) -->
            <div class="mb-4 hidden" data-ie-clients-bulkbar>
                <div class="flex flex-col md:flex-row items-center justify-between gap-3 px-4 py-3 rounded-xl bg-emerald-50 border border-emerald-100 text-sm">
                    <p class="text-emerald-900 font-medium">
                        <span data-ie-clients-bulk-count>0</span> clients selected
                    </p>
                    <div class="flex flex-wrap items-center gap-2">
                        <button type="button" data-action="clients-bulk-archive" class="ie-btn ie-btn-danger">
                            Archive
                        </button>
                        <button type="button" data-action="clients-bulk-clear" class="ie-btn ie-btn-secondary">
                            Clear selection
                        </button>
                    </div>
                </div>
            </div>

            <!-- Customers Table Section -->
            <div class="glass-card ie-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="ie-table">
                        <thead class="bg-gray-50/80">
                            <tr>
                                <th class="ie-table-th w-10">
                                    <input type="checkbox" class="ie-table-checkbox" data-ie-clients-select-all>
                                </th>
                                <th class="ie-table-th">Company</th>
                                <th class="ie-table-th">City</th>
                                <th class="ie-table-th">Active Offers</th>
                                <th class="ie-table-th">Email</th>
                                <th class="ie-table-th">Phone</th>
                                <th class="ie-table-th text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm" data-ie-clients-body>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="p-6 bg-white/50 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-gray-100" data-ie-pagination>
                    <p class="text-xs text-gray-500 font-medium" data-ie-pagination-summary>Showing 0 of 0 results</p>
                    <div class="flex items-center space-x-2">
                        <button
                            type="button"
                            data-ie-pagination-prev
                            class="ie-btn ie-btn-secondary disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                            </svg>
                        </button>
                        <span class="text-xs font-bold text-gray-700 px-3 uppercase tracking-titter" data-ie-pagination-pages>Page 1 of 1</span>
                        <button
                            type="button"
                            data-ie-pagination-next
                            class="ie-btn ie-btn-primary disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

                </div>
            </div>

        </div>
        </div>
        </main>
    </div>

    <!-- Supabase (auth + data) -->
    <!-- Config: must be loaded before Supabase client boot -->
    <script src="../../assets/js/config.js"></script>
    <script src="../shared/header-loader.js"></script>
    <script src="../core/debug.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../core/supabase-client.js"></script>
    <script src="core/data/candidates.js"></script>
    <script src="core/data/clients.js"></script>
    <script src="core/data/job-offers.js"></script>
    <script src="core/data/applications.js"></script>
    <script src="../core/supabase.js"></script>
    <script src="../core/auth.js"></script>
    <script src="../core/session-ready.js"></script>
    <script src="../core/router.js"></script>
    <script src="../runtime/router-runtime.js"></script>
    <script src="../runtime/forms-runtime.js"></script>
    <script src="../runtime/modals-runtime.js"></script>
    <script src="../runtime/profile-runtime.js"></script>
    <script src="../runtime/status-runtime.js"></script>
    <script src="runtime/associations-runtime.js"></script>
    <script src="runtime/candidate-profile-runtime.js"></script>
    <script src="runtime/candidate-runtime.js"></script>
    <script src="runtime/client-runtime.js"></script>
    <script src="runtime/job-offer-runtime.js"></script>
    <script src="runtime/shared-formatters-runtime.js"></script>
    <script src="../runtime/header-runtime.js"></script>
    <script src="../runtime/global-header-actions-runtime.js"></script>
    <script src="runtime/entity-actions-runtime.js"></script>
    <script src="../runtime/page-bootstrap.js"></script>
    <script src="../components/page-header.js"></script>
    <script src="../core/entity-toolbar.js"></script>
    <script src="runtime/lists/shared-list-helpers.js"></script>
    <script src="runtime/lists/clients-list.js"></script>
    <script src="../core/lists-runtime.js"></script>
    <script src="../core/session/session.js"></script>
    <script src="../core/ui/modals.js"></script>
    <script src="../core/ui/previews.js"></script>
    <script src="../runtime/filter-drawer-runtime.js"></script>
    <script src="../core/app-shell.js"></script>
</body>
</html>
