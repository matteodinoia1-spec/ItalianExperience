<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Add client | Italian Experience Recruitment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/ui.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <div class="portal-shell">
        <main class="portal-main portal-main--no-toolbar flex-1 flex flex-col min-w-0">
        <div id="portal-header"></div>

        <!-- Page Content -->
        <div class="page-container">
        <div class="portal-content p-8 space-y-8">

            <div class="page-form-actions">
                <div class="page-form-actions__meta">
                    <span
                        class="page-form-actions__label"
                        data-entity-mode-indicator="client"
                    ></span>
                </div>
                <div class="page-form-actions__actions">
                    <div id="clientActions" class="flex items-center gap-2"></div>
                </div>
            </div>

            <form id="clientForm" class="space-y-8">

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

                    <!-- LEFT COLUMN: main client information -->
                    <div class="space-y-8 lg:col-span-2">
                        <div class="ie-card glass-card p-8 rounded-3xl">
                            <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Company Information</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="md:col-span-2">
                                    <label class="form-label">Company name *</label>
                                    <input type="text" name="name" required placeholder="e.g. Grand Hotel Milano" class="form-input">
                                </div>
                                <div>
                                    <label class="form-label">City</label>
                                    <input type="text" name="city" placeholder="e.g. Milan" class="form-input">
                                </div>
                                <div>
                                    <label class="form-label">State / Region</label>
                                    <input type="text" name="state" placeholder="e.g. Lombardy" class="form-input">
                                </div>
                                <div>
                                    <label class="form-label">Country</label>
                                    <input type="text" name="country" placeholder="e.g. Italy" class="form-input">
                                </div>
                                <div>
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" placeholder="contatti@azienda.it" class="form-input">
                                </div>
                                <div>
                                    <label class="form-label">Phone</label>
                                    <input type="text" name="phone" placeholder="+39 02 1234567" class="form-input">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: notes & activity -->
                    <div class="space-y-8 lg:col-span-1">
                        <div class="ie-card glass-card p-8 rounded-3xl">
                            <h3 class="serif text-xl font-bold text-[#1b4332] section-title">Notes</h3>
                            <div>
                                <label class="form-label">Notes</label>
                                <textarea name="notes" rows="3" placeholder="Optional notes..." class="form-input resize-none"></textarea>
                            </div>
                        </div>

                        <!-- Activity: visible on view only; hidden on edit -->
                        <div id="client-activity-section-wrap">
                            <div id="activity-container"></div>
                        </div>
                    </div>

                </div>

            </form>
        </div>
        </div>
        </main>
    </div>

    <!-- Config: must be loaded before Supabase client boot -->
    <script src="../../assets/js/config.js"></script>
    <script src="../shared/header-loader.js"></script>
    <script src="../core/debug.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../core/supabase-client.js"></script>
    <script src="../core/data/candidates.js"></script>
    <script src="../core/data/clients.js"></script>
    <script src="../core/data/job-offers.js"></script>
    <script src="../core/data/applications.js"></script>
    <script src="../core/supabase.js"></script>
    <script src="../core/auth.js"></script>
    <script src="../core/session-ready.js"></script>
    <script src="../core/router.js"></script>
    <script src="../runtime/router-runtime.js"></script>
    <script src="../runtime/forms-runtime.js"></script>
    <script src="../runtime/modals-runtime.js"></script>
    <script src="../runtime/profile-runtime.js"></script>
    <script src="../runtime/status-runtime.js"></script>
    <script src="../runtime/associations-runtime.js"></script>
    <script src="../runtime/candidate-profile-runtime.js"></script>
    <script src="../runtime/candidate-runtime.js"></script>
    <script src="../runtime/client-runtime.js"></script>
    <script src="../runtime/job-offer-runtime.js"></script>
    <script src="../runtime/shared-formatters-runtime.js"></script>
    <script src="../runtime/header-runtime.js"></script>
    <script src="../runtime/global-header-actions-runtime.js"></script>
    <script src="../runtime/entity-actions-runtime.js"></script>
    <script src="../runtime/page-bootstrap.js"></script>
    <script src="../components/page-header.js"></script>
    <script src="../core/entity-toolbar.js"></script>
    <script src="../core/lists-runtime.js"></script>
    <script src="../core/session/session.js"></script>
    <script src="../core/ui/modals.js"></script>
    <script src="../core/ui/previews.js"></script>
    <script src="../core/app-shell.js"></script>
    <script src="../shared/activity-section.js"></script>
</body>
</html>
