<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidates | Italian Experience Recruitment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/ui.css">
</head>
<body class="flex min-h-screen" style="visibility: hidden;">

    <div class="portal-shell">
        <!-- MAIN CONTENT -->
        <main class="portal-main portal-main--no-toolbar flex-1 flex flex-col min-w-0">
        <div id="portal-header"></div>

        <!-- Page Content -->
        <div class="page-container">
        <div class="portal-content p-8 space-y-8">
            <div class="page-layout-with-filters">
                <div class="page-filters-drawer-backdrop" data-close-filter-drawer aria-hidden="true"></div>
                <aside class="page-filters-column">
                    <div class="page-filters-column__mobile-header">
                        <span class="page-filters-column__mobile-title">Filters</span>
                        <button type="button" class="page-filters-drawer-close" data-close-filter-drawer aria-label="Close filters">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div class="filter-bar page-filters-column__bar">
                        <div class="filter-group relative">
                            <label class="filter-label">Search by name</label>
                            <div class="relative">
                                <input type="text" placeholder="First name, last name..." data-filter="candidate-name" class="filter-input w-full pl-10 pr-4">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 bottom-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </div>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Availability</label>
                            <select data-filter="candidate-status" class="filter-select w-full appearance-none cursor-pointer">
                                <option value="">All availability</option>
                                <option value="available">Available</option>
                                <option value="in_process">In process</option>
                                <option value="working">Working</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Source</label>
                            <select data-filter="candidate-source" class="filter-select w-full appearance-none cursor-pointer">
                                <option value="">All sources</option>
                                <option value="linkedin">LinkedIn</option>
                                <option value="email">Email</option>
                                <option value="facebook">Facebook</option>
                                <option value="website">Website</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                </aside>
                <div class="page-main-column">
                    <div class="page-list-actions">
                        <button data-action="add-candidate" class="ie-btn ie-btn-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                            </svg>
                            <span>Add Candidate</span>
                        </button>
                    </div>
                    <div class="page-filters-trigger-wrap">
                        <button type="button" class="page-filters-trigger" data-toggle-filter-drawer aria-label="Open filters">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                            </svg>
                            <span>Filters</span>
                        </button>
                    </div>
                    <!-- Offer Filter Banner (from URL) -->
                    <div class="mb-4 hidden" data-ie-offer-filter-banner>
                        <div class="flex items-center justify-between px-4 py-3 rounded-xl bg-emerald-50 border border-emerald-100 text-sm">
                            <p class="text-emerald-900">
                                Filtered by job offer:
                                <span class="font-semibold" data-ie-offer-filter-title>—</span>
                            </p>
                            <button
                                type="button"
                                data-action="clear-offer-filter"
                                class="ie-btn ie-btn-secondary"
                            >
                                Clear filter
                            </button>
                        </div>
                    </div>
                    <!-- Candidates Table Section -->
                    <div class="glass-card ie-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="ie-table">
                        <thead class="bg-gray-50/80 text-gray-500 text-[10px] uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-5 font-bold">Photo</th>
                                <th class="px-6 py-5 font-bold">Full Name</th>
                                <th class="px-6 py-5 font-bold">Position</th>
                                <th class="px-6 py-5 font-bold">Client Name</th>
                                <th class="px-6 py-5 font-bold">Address</th>
                                <th class="px-6 py-5 font-bold">Availability</th>
                                <th class="px-6 py-5 font-bold">Source</th>
                                <th class="px-6 py-5 font-bold">Date Added</th>
                                <th class="px-6 py-5 font-bold text-center">CV</th>
                                <th class="px-6 py-5 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm" data-ie-candidates-body>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination / Footer Table -->
                <div class="p-6 bg-white/50 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-gray-100" data-ie-pagination>
                    <p class="text-xs text-gray-500 font-medium" data-ie-pagination-summary>Showing 0 of 0 results</p>
                    <div class="flex items-center space-x-2">
                        <button type="button" data-ie-pagination-prev class="ie-btn ie-btn-secondary disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <span class="text-xs font-bold text-gray-700 px-3 uppercase tracking-titter" data-ie-pagination-pages>Page 1 of 1</span>
                        <button type="button" data-ie-pagination-next class="ie-btn ie-btn-primary disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>

                </div>
            </div>

        </div>
        </div>
        </main>
    </div>

    <!-- Supabase (auth + data) -->
    <script>
      window.pageMeta = {
        title: "Candidates",
        subtitle: "Manage and track talent in your exclusive network",
        breadcrumbs: [
          { label: "Dashboard", entity: "dashboard" },
          { label: "Candidates" }
        ]
      };
    </script>
    <script src="shared/header-loader.js"></script>
    <script src="core/debug.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="core/supabase.js"></script>
    <script src="core/auth.js"></script>
    <script src="core/session-ready.js"></script>
    <script src="core/router.js"></script>
    <script src="runtime/router-runtime.js"></script>
    <script src="runtime/forms-runtime.js"></script>
    <script src="runtime/modals-runtime.js"></script>
    <script src="runtime/profile-runtime.js"></script>
    <script src="runtime/status-runtime.js"></script>
    <script src="runtime/associations-runtime.js"></script>
    <script src="runtime/candidate-profile-runtime.js"></script>
    <script src="runtime/candidate-runtime.js"></script>
    <script src="runtime/client-runtime.js"></script>
    <script src="runtime/job-offer-runtime.js"></script>
    <script src="runtime/header-runtime.js"></script>
    <script src="runtime/entity-actions-runtime.js"></script>
    <script src="runtime/page-bootstrap.js"></script>
    <script src="components/page-header.js"></script>
    <script src="core/entity-toolbar.js"></script>
    <script src="core/lists-runtime.js"></script>
    <script src="core/session/session.js"></script>
    <script src="core/ui/modals.js"></script>
    <script src="core/ui/previews.js"></script>
    <script src="runtime/filter-drawer-runtime.js"></script>
    <script src="core/app-shell.js"></script>
</body>
</html>
