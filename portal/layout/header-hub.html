<header class="portal-header h-[72px] bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between">
  <div class="portal-header__inner">
    <div class="portal-header__left">
      <span class="portal-header__page-title" id="portal-header-page-title" aria-hidden="true"></span>
    </div>
    <div class="portal-header__right">
      <div class="portal-header-user-area">
        <div class="portal-header-user" data-user-block data-user-menu-trigger role="button" tabindex="0" aria-haspopup="true" aria-expanded="false" aria-label="User menu">
          <div class="text-right hidden md:block">
            <p class="text-sm font-semibold text-gray-800" data-user-name>—</p>
            <p class="text-[10px] uppercase tracking-tighter text-[#c5a059] font-bold portal-header-user-role" data-user-role>—</p>
          </div>
          <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-[#c5a059] overflow-hidden">
            <img src="https://ui-avatars.com/api/?name=User&background=1b4332&color=fff" alt="User avatar" data-user-avatar>
          </div>
        </div>
        <div class="portal-header-user-menu" aria-label="User menu">
          <a href="profile.html" class="portal-header-user-menu__item">Settings</a>
          <a href="#" data-action="logout" class="portal-header-user-menu__item">Logout</a>
        </div>
      </div>
    </div>
  </div>
</header>
