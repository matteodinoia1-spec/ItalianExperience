<div id="cookie-banner" role="dialog" aria-label="Cookies & Privacy" aria-describedby="cookie-banner-desc">
  <div class="cookie-banner-inner">
    <h2 class="cookie-banner-title">Cookies & Privacy</h2>
    <p id="cookie-banner-desc" class="cookie-banner-body">
      We use cookies to improve your browsing experience and analyze website traffic.
      You can accept all cookies or reject non-essential ones.
    </p>
    <div class="cookie-banner-actions">
      <a href="/ItalianExperience/privacy/" class="cookie-banner-link">Privacy & Cookie Policy</a>
      <div class="cookie-banner-buttons">
        <button type="button" class="cookie-banner-btn cookie-banner-btn-reject" data-action="reject">Reject</button>
        <button type="button" class="cookie-banner-btn cookie-banner-btn-accept" data-action="accept">Accept all</button>
      </div>
    </div>
  </div>
</div>
