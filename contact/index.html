<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Contact | Italian Experience</title>

  <meta name="description" content="Contact Italian Experience for bespoke travel, business partnerships, and premium advisory services." />
  <meta name="keywords" content="Italian Experience, contact, bespoke travel, partnerships, advisory, luxury Italy" />
  <meta name="author" content="Italian Experience" />
  <meta name="robots" content="index, follow" />

  <link rel="canonical" href="https://www.italianexp.com/contact/" />

  <meta property="og:title" content="Contact | Italian Experience" />
  <meta property="og:description" content="Contact Italian Experience for bespoke travel, partnerships, and premium advisory services." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.italianexp.com/contact/" />
  <meta property="og:image" content="https://www.italianexp.com/assets/preview.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact | Italian Experience" />
  <meta name="twitter:description" content="Contact Italian Experience for bespoke travel, partnerships, and premium advisory services." />
  <meta name="twitter:image" content="https://www.italianexp.com/assets/preview.jpg" />

  <link rel="stylesheet" href="/ItalianExperience/assets/css/tailwind.css" />
  <link rel="stylesheet" href="/ItalianExperience/assets/css/site.css" />
  <link rel="stylesheet" href="/ItalianExperience/assets/css/cookie-banner.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.12.2/build/css/intlTelInput.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.12.2/build/js/intlTelInput.min.js"></script>

  <style>
    .contact-hero {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 2rem 3rem;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url("https://images.unsplash.com/photo-1521017432531-fbd92d768814?auto=format&fit=crop&w=2200&q=80");
      background-size: cover;
      background-position: center;
      filter: brightness(0.28) contrast(1.15);
      transform: scale(1.03);
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(8,8,8,0.88) 0%,
        rgba(8,8,8,0.55) 55%,
        rgba(8,8,8,0.92) 100%
      );
      z-index: 1;
    }

    .contact-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1060px;
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 3rem;
      align-items: start;
      padding-top: 20px;
      padding-bottom: clamp(1rem, 3vh, 2.5rem);
    }

    .contact-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(197,160,89,0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      width: 100%;
      max-width: 620px;
      margin-left: auto;
      padding: 2.3rem;
      border-radius: 4px;
      box-shadow: 0 25px 55px rgba(0,0,0,0.45);
    }

    .contact-meta {
      border-left: 1px solid rgba(197,160,89,0.22);
      padding-left: 3rem;
    }

    .contact-meta small {
      font-size: 0.6rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      display: block;
      margin-bottom: 1rem;
    }

    .contact-meta h1 {
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .contact-meta p {
      color: rgba(255,255,255,0.7);
      line-height: 1.8;
      font-weight: 300;
      max-width: 520px;
    }

    .contact-meta .gold-line {
      width: 80px;
      height: 1px;
      background: var(--brand-gold);
      margin: 2rem 0;
      opacity: 0.6;
    }

    .contact-footnote {
      margin-top: 2.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
      line-height: 1.8;
    }

    @media (max-width:1024px){
      .contact-wrapper {
        grid-template-columns: 1fr;
        gap: 2.4rem;
        max-width: 740px;
        margin: 0 auto;
        padding-top: 16px;
      }

      .contact-meta {
        border-left: none;
        padding-left: 0;
        text-align: center;
      }

      .contact-meta p {
        margin: 0 auto;
      }

      .contact-meta .gold-line {
        margin: 2rem auto;
      }

      .contact-card {
        max-width: 100%;
        margin-left: 0;
        padding: 1.9rem;
      }
    }

    @media (max-width:768px){
      .contact-hero.ie-hero-shell {
        height: auto;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: visible;
        padding: 1rem 1rem 2rem;
        align-items: flex-start;
      }

      .contact-wrapper {
        padding-top: 12px;
        gap: 1.5rem;
      }

      .contact-card {
        padding: 1.25rem;
      }
      
      /* form field sizing handled by shared ie-form system */
    }
  </style>
</head>

<body class="bg-[#080808] text-white overflow-x-hidden">

  <div id="site-header"></div>

  <main>

    <section class="contact-hero ie-hero-shell ie-hero-offset" aria-label="Contact hero">
      <div class="hero-bg ie-hero-bg-layer" aria-hidden="true"></div>
      <div class="hero-overlay ie-hero-overlay-layer" aria-hidden="true"></div>

      <div class="contact-wrapper ie-hero-content-layer">

        <div class="contact-meta ie-reveal">
          <small>Italian Experience</small>

          <h1 class="ie-hero-title ie-hero-title-compact tracking-tighter font-bold">
            Contact <span class="italic font-light text-[#c5a059]">Us.</span>
          </h1>

          <div class="gold-line"></div>

          <p class="ie-hero-copy">
            Whether you are seeking bespoke travel experiences, business partnerships, or strategic advisory,
            our team will respond with discretion and precision.
          </p>

          <div class="contact-footnote">
            Premium inquiries only <br />
             
          </div>
        </div>

        <div class="contact-card">
          <form
            id="contactForm"
            method="POST"
            action="https://forms.zohopublic.com/italianrecruitment/form/ItalianExperience/formperma/dSUYWQws7Sq0pF8lp6bSn-L3IVYXlfjJkrN7lkFScAM/htmlRecords/submit"
            accept-charset="UTF-8"
            enctype="multipart/form-data"
            target="zoho-contact-submit-frame"
          >
            <input type="hidden" name="zf_referrer_name" value="" />
            <input type="hidden" name="zf_redirect_url" value="" />
            <input type="hidden" name="zc_gad" value="" />
            <input type="hidden" name="Dropdown" value="Contact us" />
            <input type="hidden" name="PhoneNumber_countrycode" id="contact-phone-hidden" />
            
            <div class="grid md:grid-cols-2 gap-6 mb-6">
              <div>
                <label class="input-label ie-form-label is-required" for="contact-first-name">First Name</label>
                <input id="contact-first-name" type="text" name="Name_First" maxlength="255" class="field ie-form-field ie-form-field--lg" placeholder="First Name" autocomplete="given-name" required />
              </div>

              <div>
                <label class="input-label ie-form-label is-required" for="contact-last-name">Last Name</label>
                <input id="contact-last-name" type="text" name="Name_Last" maxlength="255" class="field ie-form-field ie-form-field--lg" placeholder="Last Name" autocomplete="family-name" required />
              </div>
            </div>

            <div class="mb-6">
              <label class="input-label ie-form-label is-required" for="contact-topic">Topic</label>
              <select id="contact-topic" name="Dropdown6" class="field w-full ie-form-field ie-form-field--lg ie-form-select ie-form-select--lg" required>
                <option value="" selected>Select topic</option>
                <option value="General Information">General Information</option>
                <option value="Bespoke Travel and Experience">Bespoke Travel and Experience</option>
                <option value="Business and Partnerships">Business and Partnerships</option>
                <option value="Press and Media">Press and Media</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="mb-6">
              <label class="input-label ie-form-label is-required" for="contact-email">Email</label>
              <input id="contact-email" type="email" name="Email" maxlength="255" class="field w-full ie-form-field ie-form-field--lg" placeholder="you@example.com" autocomplete="email" required />
            </div>

            <div class="mb-6">
              <label class="input-label ie-form-label is-required" for="contact-phone">Phone Number</label>
              <div class="contact-intl ie-form-intl">
                <input type="tel" class="field ie-form-field ie-form-field--lg" id="contact-phone" maxlength="30" placeholder="Phone number" autocomplete="tel-national" required />
              </div>
            </div>

            <div class="mb-8">
              <label class="input-label ie-form-label is-required" for="contact-message">How can we assist you today?</label>
              <textarea id="contact-message" name="MultiLine7" maxlength="65535" class="field ie-form-field ie-form-field--lg ie-form-textarea ie-form-textarea--fixed" placeholder="Please describe your request..." required></textarea>
            </div>

            <button type="submit" class="btn-gold ie-form-btn ie-btn-primary">
              Send Inquiry
            </button>

          </form>
          <div class="contact-success ie-form-success" id="contact-success-msg" role="status" aria-live="polite">Thank you for your submission.</div>
          <iframe title="Zoho contact submit frame" name="zoho-contact-submit-frame" style="display:none;"></iframe>

        </div>

      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <script src="/ItalianExperience/assets/js/bootstrap.js"></script>

  <script src="/ItalianExperience/assets/js/forms.js"></script>
  <script>
    (function () {
      if (!window.IEForms || !window.IEForms.attachZohoPhoneForm) return;

      window.IEForms.attachZohoPhoneForm({
        formId: "contactForm",
        phoneInputId: "contact-phone",
        phoneHiddenId: "contact-phone-hidden",
        successMessageId: "contact-success-msg",
        iframeSelector: 'iframe[name="zoho-contact-submit-frame"]',
        intlTelInputOptions: {
          initialCountry: "us",
          separateDialCode: true,
          preferredCountries: ["us", "it", "gb", "fr", "de", "es"],
          loadUtils: function () {
            return import(
              "https://cdn.jsdelivr.net/npm/intl-tel-input@25.12.2/build/js/utils.js"
            );
          },
        },
      });
    })();
  </script>
  <script defer src="/ItalianExperience/assets/js/cookie-consent.js"></script>

</body>
</html>
